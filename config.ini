[comfyui]
# ComfyUI server URL
server_url = http://localhost:8188

# Local ComfyUI installation path (for local mode)
# Set this if dashboard runs on same machine as ComfyUI
# Example Windows: C:/ComfyUI
# Example Linux: /home/u/ComfyUI
local_path = /home/user/ComfyUI

[output]
# Local output directory (optional, for local file access)
output_dir = output

[defaults]
# Default batch size for image generation
batch_size = 1

# Default prompt file (optional)
# prompt_file = prompt.txt

[dashboard]
# Dashboard web server port
port = 5000

# HTTP Basic Authentication
# Set auth_enabled = true and provide username/password to require login
auth_enabled = true
auth_username = admin
auth_password = admin

# Guest account (can only access /gallery)
guest_enabled = true
guest_username = guest
guest_password = guest

# HTTPS/SSL settings
# Set ssl_enabled = true to enable HTTPS
# You need to provide cert and key files
# To generate a self-signed cert:
#   openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 365 -nodes
ssl_enabled = false
ssl_cert = cert.pem
ssl_key = key.pem
