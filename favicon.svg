<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>
  <!-- Connection lines -->
  <line x1="38" y1="44" x2="64" y2="64" stroke="url(#glow)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="90" y1="44" x2="64" y2="64" stroke="url(#glow)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="64" y1="64" x2="38" y2="88" stroke="url(#glow)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="64" y1="64" x2="90" y2="88" stroke="url(#glow)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- Center node (large) -->
  <circle cx="64" cy="64" r="12" fill="white" opacity="0.95"/>
  <circle cx="64" cy="64" r="7" fill="url(#bg)"/>
  <!-- Top-left node -->
  <circle cx="38" cy="44" r="9" fill="white" opacity="0.9"/>
  <circle cx="38" cy="44" r="5" fill="#a5b4fc"/>
  <!-- Top-right node -->
  <circle cx="90" cy="44" r="9" fill="white" opacity="0.9"/>
  <circle cx="90" cy="44" r="5" fill="#c084fc"/>
  <!-- Bottom-left node -->
  <circle cx="38" cy="88" r="9" fill="white" opacity="0.9"/>
  <circle cx="38" cy="88" r="5" fill="#c084fc"/>
  <!-- Bottom-right node -->
  <circle cx="90" cy="88" r="9" fill="white" opacity="0.9"/>
  <circle cx="90" cy="88" r="5" fill="#a5b4fc"/>
</svg>
